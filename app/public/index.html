<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchpad</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2230;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --green: #3fb950;
    --green-dim: #1a4428;
    --red: #f85149;
    --red-dim: #3d1a1a;
    --yellow: #d29922;
    --yellow-dim: #2d2009;
    --blue: #58a6ff;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #1f6feb, #58a6ff);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
  }

  h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.01em; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .count-badge {
    background: var(--green-dim); color: var(--green);
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 20px; border: 1px solid #2d6a3f;
  }

  .scan-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s; font-family: inherit;
  }
  .scan-btn:hover { background: var(--surface-hover); border-color: #58a6ff55; }
  .scan-btn:active { transform: scale(0.97); }
  .scan-btn.spinning .scan-icon { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 0;
    padding: 0 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    background: transparent; color: var(--text-muted);
    border: none; border-bottom: 2px solid transparent;
    padding: 10px 18px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }

  /* ── Main ── */
  main { padding: 24px 28px; max-width: 1400px; margin: 0 auto; }

  /* ── Filter bar (containers tab) ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 20px; align-items: center;
  }

  .filter-btn {
    background: transparent; color: var(--text-muted);
    border: 1px solid transparent; border-radius: 6px;
    padding: 4px 12px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--border); }
  .filter-btn.active { color: var(--text); background: var(--surface); border-color: var(--border); }

  .bulk-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 12px; border-radius: 6px; border: 1px solid;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .bulk-btn.start-all { background: var(--green-dim); border-color: #2d6a3f; color: var(--green); }
  .bulk-btn.start-all:hover { background: #1e5230; }
  .bulk-btn.stop-all  { background: var(--red-dim);   border-color: #5a1e1e; color: var(--red);   }
  .bulk-btn.stop-all:hover  { background: #4a1515; }
  .bulk-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

  .search-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    padding: 4px 12px; font-family: inherit; outline: none;
    margin-left: auto; width: 200px; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: #58a6ff55; }
  .search-input::placeholder { color: var(--text-muted); }

  /* ── Container cards grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .card:hover { border-color: #444c56; transform: translateY(-1px); }
  .card.running { border-color: #2d6a3f55; }
  .card.running::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--green);
  }

  .card-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 8px;
  }

  .card-name {
    font-weight: 600; font-size: 13px; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0; margin-top: 3px;
  }
  .status-dot.running { background: var(--green); box-shadow: 0 0 6px #3fb95066; }
  .status-dot.stopped { background: #444c56; }
  .status-dot.partial { background: var(--yellow); box-shadow: 0 0 6px #d2992266; }

  .card-image { color: var(--text-muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-status { font-size: 12px; color: var(--text-muted); }
  .card-status.running { color: var(--green); }

  .ports { display: flex; flex-wrap: wrap; gap: 5px; }

  .port-link {
    display: inline-flex; align-items: center; gap: 3px;
    color: var(--blue); text-decoration: none; font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: #1c2a3d; border: 1px solid #1f3a5c;
    border-radius: 4px; padding: 2px 7px; transition: background 0.15s;
  }
  .port-link:hover { background: #1f3a5c; }

  .port-text {
    color: var(--text-muted); font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 2px 7px;
  }

  .card-btn {
    width: 100%; padding: 7px; border-radius: 6px; border: 1px solid;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
    letter-spacing: 0.02em; margin-top: auto;
  }
  .card-btn.stop { background: var(--red-dim); border-color: #5a1e1e; color: var(--red); }
  .card-btn.stop:hover { background: #4a1515; }
  .card-btn.start { background: var(--green-dim); border-color: #2d6a3f; color: var(--green); }
  .card-btn.start:hover { background: #1e5230; }
  .card-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Groups tab ── */
  .groups-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 20px;
  }

  .groups-header h2 { font-size: 14px; font-weight: 600; color: var(--text-muted); }

  .new-group-btn {
    display: flex; align-items: center; gap: 6px;
    background: #1c2a3d; color: var(--blue);
    border: 1px solid #1f3a5c; border-radius: 6px;
    padding: 6px 14px; font-size: 13px; cursor: pointer;
    transition: background 0.15s; font-family: inherit; font-weight: 500;
  }
  .new-group-btn:hover { background: #1f3a5c; }

  .groups-list { display: flex; flex-direction: column; gap: 14px; }

  /* ── Group card ── */
  .group-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    transition: border-color 0.2s;
    position: relative; overflow: hidden;
  }
  .group-card:hover { border-color: #444c56; }

  .group-card-top {
    display: flex; align-items: center;
    justify-content: space-between; gap: 12px; margin-bottom: 14px;
  }

  .group-title {
    display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
  }

  .group-status-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .group-status-dot.all-running { background: var(--green); box-shadow: 0 0 8px #3fb95066; }
  .group-status-dot.some-running { background: var(--yellow); box-shadow: 0 0 8px #d2992266; }
  .group-status-dot.none-running { background: #444c56; }

  .group-name {
    font-size: 15px; font-weight: 600; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  .group-member-count { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  .group-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .group-action-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 6px; border: 1px solid;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .group-action-btn.start-all {
    background: var(--green-dim); border-color: #2d6a3f; color: var(--green);
  }
  .group-action-btn.start-all:hover { background: #1e5230; }
  .group-action-btn.stop-all {
    background: var(--red-dim); border-color: #5a1e1e; color: var(--red);
  }
  .group-action-btn.stop-all:hover { background: #4a1515; }
  .group-action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .icon-btn {
    background: transparent; color: var(--text-muted);
    border: 1px solid transparent; border-radius: 6px;
    width: 30px; height: 30px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 13px;
    transition: all 0.15s; font-family: inherit;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--border); background: var(--surface-hover); }
  .icon-btn.delete:hover { color: var(--red); border-color: #5a1e1e; background: var(--red-dim); }

  /* ── Container pills inside group card ── */
  .group-members { display: flex; flex-wrap: wrap; gap: 8px; }

  .member-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px;
    font-size: 12px; color: var(--text-muted);
    transition: border-color 0.15s;
  }
  .member-pill.running { color: var(--text); border-color: #2d6a3f55; }

  .member-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .member-dot.running { background: var(--green); }
  .member-dot.stopped { background: #444c56; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: #00000099; backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px;
    width: 480px; max-width: calc(100vw - 48px);
    max-height: 80vh; display: flex; flex-direction: column;
    transform: translateY(16px); transition: transform 0.2s;
    box-shadow: 0 16px 48px #00000088;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 20px;
  }
  .modal-header h2 { font-size: 15px; font-weight: 600; }

  .close-btn {
    background: transparent; color: var(--text-muted); border: none;
    font-size: 18px; cursor: pointer; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: all 0.15s; font-family: inherit;
  }
  .close-btn:hover { background: var(--surface-hover); color: var(--text); }

  .modal-field { margin-bottom: 18px; }

  .modal-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .modal-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    padding: 8px 12px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  .modal-input:focus { border-color: #58a6ff55; }

  .checkbox-list {
    overflow-y: auto; max-height: 260px;
    border: 1px solid var(--border); border-radius: 8px;
  }

  .checkbox-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer;
    transition: background 0.1s; border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .checkbox-item:last-child { border-bottom: none; }
  .checkbox-item:hover { background: var(--surface-hover); }
  .checkbox-item input[type=checkbox] { accent-color: var(--blue); width: 15px; height: 15px; cursor: pointer; }

  .checkbox-label { flex: 1; font-size: 13px; }
  .checkbox-state { font-size: 11px; }
  .checkbox-state.running { color: var(--green); }
  .checkbox-state.stopped { color: var(--text-muted); }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  }

  .btn-cancel {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 16px; font-size: 13px; cursor: pointer;
    font-family: inherit; transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: #444c56; }

  .btn-save {
    background: var(--blue); color: #0d1117;
    border: 1px solid var(--blue); border-radius: 6px;
    padding: 7px 16px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-save:hover { background: #79b8ff; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; font-size: 13px;
    color: var(--text); box-shadow: 0 4px 20px #00000066;
    transform: translateY(80px); opacity: 0;
    transition: all 0.25s ease; z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">&#x1F680;</div>
    <h1>Launchpad</h1>
  </div>
  <div class="header-right">
    <span class="count-badge" id="runningCount">0 running</span>
    <button class="scan-btn" id="scanBtn" onclick="scan()">
      <span class="scan-icon" id="scanIcon">&#x27F3;</span>
      Scan
    </button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('containers', this)">All Containers</button>
  <button class="tab-btn" onclick="switchTab('groups', this)">Groups</button>
</div>

<main>
  <!-- Containers tab -->
  <div id="view-containers">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('running', this)">Running</button>
      <button class="filter-btn" onclick="setFilter('stopped', this)">Stopped</button>
      <div class="filter-sep"></div>
      <button class="bulk-btn start-all" id="bulkStartBtn" onclick="bulkAction('start')">&#x25B6; Start All</button>
      <button class="bulk-btn stop-all"  id="bulkStopBtn"  onclick="bulkAction('stop')">&#x25A0; Stop All</button>
      <input class="search-input" id="searchInput" type="text" placeholder="Search containers..." oninput="renderCards()">
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Groups tab -->
  <div id="view-groups" style="display:none">
    <div class="groups-header">
      <h2 id="groupsSubtitle">Groups</h2>
      <button class="new-group-btn" onclick="openModal()">+ New Group</button>
    </div>
    <div class="groups-list" id="groupsList"></div>
  </div>
</main>

<!-- Create / Edit Group Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">New Group</h2>
      <button class="close-btn" onclick="closeModal()">&#x2715;</button>
    </div>

    <div class="modal-field">
      <label class="modal-label" for="groupNameInput">Group Name</label>
      <input class="modal-input" id="groupNameInput" type="text" placeholder="e.g. Dev Stack" oninput="validateModal()">
    </div>

    <div class="modal-field" style="flex:1;display:flex;flex-direction:column">
      <label class="modal-label">Containers</label>
      <div class="checkbox-list" id="checkboxList"></div>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveGroup()" disabled>Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let allContainers = [];
  let allGroups = [];
  let currentFilter = 'all';
  let currentTab = 'containers';
  let editingGroupId = null;

  // ── Data loading ────────────────────────────────────────────────────────────

  async function loadContainers() {
    const res = await fetch('/api/containers');
    if (!res.ok) throw new Error('Failed to fetch containers');
    allContainers = await res.json();
  }

  async function loadGroups() {
    const res = await fetch('/api/groups');
    if (!res.ok) throw new Error('Failed to fetch groups');
    allGroups = await res.json();
  }

  // ── Scan ────────────────────────────────────────────────────────────────────

  async function scan() {
    const btn = document.getElementById('scanBtn');
    btn.classList.add('spinning');
    btn.disabled = true;
    try {
      await Promise.all([loadContainers(), loadGroups()]);
      renderView();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      btn.classList.remove('spinning');
      btn.disabled = false;
    }
  }

  // ── Tab switching ───────────────────────────────────────────────────────────

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('view-containers').style.display = tab === 'containers' ? '' : 'none';
    document.getElementById('view-groups').style.display     = tab === 'groups'     ? '' : 'none';
    renderView();
  }

  function renderView() {
    updateRunningBadge();
    if (currentTab === 'containers') renderCards();
    else renderGroups();
  }

  function updateRunningBadge() {
    const running = allContainers.filter(c => c.state === 'running').length;
    document.getElementById('runningCount').textContent = `${running} running`;
  }

  // ── Containers tab ──────────────────────────────────────────────────────────

  function renderCards() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const grid  = document.getElementById('grid');

    let list = allContainers;
    if (currentFilter === 'running') list = list.filter(c => c.state === 'running');
    else if (currentFilter === 'stopped') list = list.filter(c => c.state !== 'running');
    if (query) list = list.filter(c =>
      c.name.toLowerCase().includes(query) || c.image.toLowerCase().includes(query)
    );

    if (list.length === 0) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">&#x1F4E6;</div><p>No containers found</p></div>`;
      return;
    }
    grid.innerHTML = list.map(cardHTML).join('');
  }

  function cardHTML(c) {
    const isRunning  = c.state === 'running';
    const stateClass = isRunning ? 'running' : 'stopped';

    const portsHTML = c.ports.length > 0
      ? `<div class="ports">${c.ports.map(p =>
          isRunning
            ? `<a class="port-link" href="http://localhost:${p.hostPort}" target="_blank" rel="noopener">:${p.hostPort} &#x2197;</a>`
            : `<span class="port-text">:${p.hostPort}</span>`
        ).join('')}</div>`
      : '';

    const btnClass = isRunning ? 'stop' : 'start';
    const btnLabel = isRunning ? '&#x25A0; Stop' : '&#x25B6; Start';
    const action   = isRunning ? 'stop' : 'start';

    return `
      <div class="card ${stateClass}" data-id="${c.id}">
        <div class="card-header">
          <span class="card-name" title="${c.name}">${c.name}</span>
          <span class="status-dot ${stateClass}"></span>
        </div>
        <div class="card-image" title="${c.image}">${c.image}</div>
        <div class="card-status ${stateClass}">${c.status}</div>
        ${portsHTML}
        <button class="card-btn ${btnClass}" onclick="toggleContainer('${c.id}', '${action}', this)">${btnLabel}</button>
      </div>`;
  }

  async function toggleContainer(id, action, btn) {
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '...';
    try {
      const res = await fetch(`/api/containers/${id}/${action}`, { method: 'POST' });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Failed'); }
      showToast(`${action === 'start' ? 'Started' : 'Stopped'} successfully`, 'success');
      await Promise.all([loadContainers(), loadGroups()]);
      renderView();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }

  function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderCards();
  }

  async function bulkAction(action) {
    // Detect self-container by matching the current page port to an exposed port,
    // so Stop All never kills the launchpad server mid-operation.
    const selfPort = parseInt(window.location.port || (window.location.protocol === 'https:' ? 443 : 80));
    const selfId   = (allContainers.find(c => c.ports.some(p => p.hostPort === selfPort)) || {}).id;

    const targets = allContainers.filter(c => {
      if (c.id === selfId) return false;
      return action === 'start' ? c.state !== 'running' : c.state === 'running';
    });

    if (targets.length === 0) {
      showToast(`No containers to ${action}`, '');
      return;
    }

    const startBtn = document.getElementById('bulkStartBtn');
    const stopBtn  = document.getElementById('bulkStopBtn');
    startBtn.disabled = true;
    stopBtn.disabled  = true;

    try {
      const results = await Promise.allSettled(
        targets.map(c =>
          fetch(`/api/containers/${c.id}/${action}`, { method: 'POST' }).then(r => {
            if (!r.ok) return r.json().then(e => Promise.reject(new Error(e.error)));
          })
        )
      );

      const failed = results.filter(r => r.status === 'rejected');
      if (failed.length > 0) {
        const first = failed[0].reason?.message || 'unknown error';
        const suffix = failed.length > 1 ? ` (+${failed.length - 1} more)` : '';
        showToast(`${first}${suffix}`, 'error');
      } else {
        showToast(`All ${action === 'start' ? 'started' : 'stopped'} (${targets.length})`, 'success');
      }

      await Promise.all([loadContainers(), loadGroups()]);
      renderView();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      startBtn.disabled = false;
      stopBtn.disabled  = false;
    }
  }

  // ── Groups tab ──────────────────────────────────────────────────────────────

  function renderGroups() {
    const list = document.getElementById('groupsList');
    const subtitle = document.getElementById('groupsSubtitle');
    subtitle.textContent = `${allGroups.length} Group${allGroups.length !== 1 ? 's' : ''}`;

    if (allGroups.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="icon">&#x1F5C2;</div>
        <p>No groups yet &mdash; click <strong>New Group</strong> to create one</p>
      </div>`;
      return;
    }

    list.innerHTML = allGroups.map(groupCardHTML).join('');
  }

  function groupCardHTML(g) {
    const members = g.containerIds.map(id =>
      allContainers.find(c => c.id === id || c.name === id) || { id, name: id, state: 'unknown' }
    );

    const runningCount = members.filter(m => m.state === 'running').length;
    const dotClass = runningCount === 0 ? 'none-running'
                   : runningCount === members.length ? 'all-running'
                   : 'some-running';

    const pillsHTML = members.map(m => {
      const isRunning = m.state === 'running';
      return `<span class="member-pill ${isRunning ? 'running' : ''}">
        <span class="member-dot ${isRunning ? 'running' : 'stopped'}"></span>
        ${m.name}
      </span>`;
    }).join('');

    return `
      <div class="group-card" data-gid="${g.id}">
        <div class="group-card-top">
          <div class="group-title">
            <span class="group-status-dot ${dotClass}"></span>
            <span class="group-name">${escHtml(g.name)}</span>
            <span class="group-member-count">${members.length} container${members.length !== 1 ? 's' : ''} &bull; ${runningCount} running</span>
          </div>
          <div class="group-actions">
            <button class="group-action-btn start-all" onclick="groupAction('${g.id}', 'start', this)">&#x25B6; Start All</button>
            <button class="group-action-btn stop-all"  onclick="groupAction('${g.id}', 'stop',  this)">&#x25A0; Stop All</button>
            <button class="icon-btn" title="Edit" onclick="openModal('${g.id}')">&#x270F;</button>
            <button class="icon-btn delete" title="Delete" onclick="deleteGroup('${g.id}', this)">&#x1F5D1;</button>
          </div>
        </div>
        <div class="group-members">${pillsHTML}</div>
      </div>`;
  }

  async function groupAction(id, action, btn) {
    const card = btn.closest('.group-card');
    const btns = card.querySelectorAll('button');
    btns.forEach(b => { b.disabled = true; });
    const original = btn.innerHTML;
    btn.innerHTML = '...';
    try {
      const res = await fetch(`/api/groups/${id}/${action}`, { method: 'POST' });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Failed'); }
      const data = await res.json();
      if (data.errors && data.errors.length > 0) {
        const first = data.errors[0] || 'unknown error';
        const suffix = data.errors.length > 1 ? ` (+${data.errors.length - 1} more)` : '';
        showToast(`${first}${suffix}`, 'error');
      }
      else
        showToast(`Group ${action === 'start' ? 'started' : 'stopped'}`, 'success');
      await Promise.all([loadContainers(), loadGroups()]);
      renderGroups();
    } catch (err) {
      showToast(err.message, 'error');
      btns.forEach(b => { b.disabled = false; });
      btn.innerHTML = original;
    }
  }

  async function deleteGroup(id, btn) {
    if (!confirm('Delete this group? Containers will not be affected.')) return;
    btn.disabled = true;
    try {
      const res = await fetch(`/api/groups/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error('Delete failed');
      showToast('Group deleted', 'success');
      await loadGroups();
      renderGroups();
    } catch (err) {
      showToast(err.message, 'error');
      btn.disabled = false;
    }
  }

  // ── Modal ───────────────────────────────────────────────────────────────────

  function openModal(groupId = null) {
    editingGroupId = groupId;
    const group = groupId ? allGroups.find(g => g.id === groupId) : null;

    document.getElementById('modalTitle').textContent = group ? 'Edit Group' : 'New Group';
    document.getElementById('groupNameInput').value   = group ? group.name : '';

    // Build checkbox list
    const list = document.getElementById('checkboxList');
    list.innerHTML = allContainers.map(c => {
      const checked = group ? group.containerIds.includes(c.id) : false;
      const isRunning = c.state === 'running';
      return `
        <label class="checkbox-item">
          <input type="checkbox" value="${c.id}" ${checked ? 'checked' : ''} onchange="validateModal()">
          <span class="checkbox-label">${escHtml(c.name)}</span>
          <span class="checkbox-state ${isRunning ? 'running' : 'stopped'}">${isRunning ? '● running' : '○ stopped'}</span>
        </label>`;
    }).join('');

    validateModal();
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('groupNameInput').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingGroupId = null;
  }

  function overlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function validateModal() {
    const name = document.getElementById('groupNameInput').value.trim();
    const checked = document.querySelectorAll('#checkboxList input:checked').length;
    document.getElementById('saveBtn').disabled = !name || checked === 0;
  }

  async function saveGroup() {
    const name = document.getElementById('groupNameInput').value.trim();
    const containerIds = [...document.querySelectorAll('#checkboxList input:checked')].map(i => i.value);

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      const url    = editingGroupId ? `/api/groups/${editingGroupId}` : '/api/groups';
      const method = editingGroupId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, containerIds }),
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Save failed'); }
      showToast(editingGroupId ? 'Group updated' : 'Group created', 'success');
      closeModal();
      await loadGroups();
      renderGroups();
    } catch (err) {
      showToast(err.message, 'error');
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.className = `toast ${type}`;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Keyboard: Escape closes modal, Enter saves
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.getElementById('modalOverlay').classList.contains('open')) {
      const btn = document.getElementById('saveBtn');
      if (!btn.disabled) saveGroup();
    }
  });

  // Initial load
  scan();
</script>
</body>
</html>
